name: Drift detection

on:
  schedule:
    - cron: "17 3 * * 1" # Mondays 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure every docUrl still returns HTTP 200
        id: doctor
        continue-on-error: true
        run: npm run doctor

      - name: Scrape every operation and diff against the shipped spec
        id: diff
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/diff-live.mjs | tee diff-report.json
          echo "exit=$?" >> $GITHUB_OUTPUT

      - name: Open or update fidelity-drift issue
        if: steps.doctor.outcome == 'failure' || steps.diff.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = `The weekly drift detection job found discrepancies between the shipped spec and the live Realtime Register documentation.\n\n`;
            body += `- doctor: ${{ steps.doctor.outcome }}\n`;
            body += `- diff: ${{ steps.diff.outcome }}\n\n`;
            if (fs.existsSync('diff-report.json')) {
              const report = fs.readFileSync('diff-report.json', 'utf8');
              body += '```json\n' + report.slice(0, 8000) + '\n```\n';
            }
            body += `\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fidelity-drift',
              per_page: 5,
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Fidelity drift detected',
                labels: ['fidelity-drift'],
                body,
              });
            }
