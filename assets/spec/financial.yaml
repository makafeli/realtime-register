# Financial category. Transactions and exchange rates. Verified against
# https://dm.realtimeregister.com/docs/api/transactions/* and
# https://dm.realtimeregister.com/docs/api/exchangerates*.
# Important: transactions live under /v2/billing/financialtransactions,
# NOT /v2/financial/transactions.

category: financial
label: Financial
description: |
  Read-only ledger access. Transactions record every billable action
  (registrations, renewals, transfers, restores, SSL issuance, etc.) as a
  set of `billables` whose amounts are in the smallest currency unit
  (cents). Exchange rates are published daily for EUR/USD conversion.

operations:

  - operationId: getTransaction
    verified: docs
    method: GET
    path: /v2/billing/financialtransactions/{transactionId}
    docUrl: /transactions/get
    async: false
    authScope: customer
    summary: Retrieve a single financial transaction.
    pathParams:
      - { name: transactionId, type: integer, required: true }
    queryParams:
      - { name: fields, type: string }
    responses:
      "200":
        description: |
          { id, customer, date, amount, currency,
            processId, processType, processIdentifier, processAction,
            chargesPerAccount?: { <currency>: <cents> },
            billables?: [{ product, action, quantity, amount, providerName }] }
          `amount` is an integer in cents. `action` uses the BillableAction enum
          (CREATE, REQUEST, TRANSFER, RENEW, RESTORE, TRANSFER_RESTORE, UPDATE,
          REGISTRANT_CHANGE, LOCAL_CONTACT, NEGATIVE_MARKUP, PRIVACY_PROTECT,
          EXTRA_WILDCARD, EXTRA_DOMAIN, REGISTRY_LOCK).
    errors: [ObjectDoesNotExist]
    gotchas:
      - "All monetary amounts are integers in cents (smallest currency unit)."
      - "`currency` is ISO 4217 alpha-3 (EUR or USD only today)."
      - "`processType` is a free-form string (e.g. `domain`, `contact`); join against `/v2/processes` for full process detail."

  - operationId: listTransactions
    verified: docs
    method: GET
    path: /v2/billing/financialtransactions
    docUrl: /transactions/list
    async: false
    authScope: customer
    summary: List financial transactions.
    queryParams:
      - { name: fields, type: string }
      - { name: q,      type: string,
          description: "Filter expression, e.g. `date:>=2025-01-01 AND processAction:RENEW`." }
      - { name: limit,  type: integer, default: 10, maximum: 1000 }
      - { name: offset, type: integer, default: 0 }
      - { name: order,  type: string, example: "-date" }
      - { name: export, type: boolean }
      - { name: "no-total", type: boolean }
    responses:
      "200": { description: "Paginated envelope of transaction objects." }
    errors: [InvalidParameter]
    gotchas:
      - "For accounting exports, prefer `export=true` + `fields=` to stream all records without pagination."

  - operationId: getExchangeRates
    verified: docs
    method: GET
    path: /v2/billing/exchangerates
    docUrl: /exchangerates
    async: false
    authScope: customer
    summary: Retrieve the exchange-rate set for a specific date (defaults to latest).
    queryParams:
      - { name: date, type: string, format: date,
          description: "Effective date (YYYY-MM-DD). Defaults to today." }
      - { name: fields, type: string }
    responses:
      "200":
        description: |
          { date, rates: { <currencyFrom>: { <currencyTo>: <rate> } } }
          Rates are decimals (e.g. 1.0823 for EUR\u2192USD). Only EUR and USD
          are quoted today.
    errors: [InvalidParameter]
    gotchas:
      - "All monetary amounts elsewhere in the API are in cents; divide by 100 before multiplying by a rate."

  - operationId: listExchangeRates
    verified: docs
    method: GET
    path: /v2/billing/exchangerates/list
    docUrl: /exchangerates/list
    async: false
    authScope: customer
    summary: List historical exchange rates across a date range.
    queryParams:
      - { name: fields, type: string }
      - { name: q,      type: string, description: "Filter on date range, currency pair." }
      - { name: limit,  type: integer, default: 10, maximum: 1000 }
      - { name: offset, type: integer, default: 0 }
      - { name: order,  type: string, example: "-date" }
    responses:
      "200": { description: "Paginated envelope of daily exchange-rate records." }
    errors: [InvalidParameter]
